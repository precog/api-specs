openapi: 3.1.0
info:
  title: public-http-api
  version: '1.0'
  description: The Precog public HTTP REST API.
  contact:
    url: 'https://precog.com'
    email: support@precog.com
servers:
  - url: 'http://localhost:30000'
security:
  - BearerAuth: []
paths:
  /sources:
    get:
      summary: Get Sources
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/connector-listing'
              examples:
                example-1:
                  value:
                    - id: '1'
                      kindId: '12'
                      name: 'Shop name: MyShop'
        '401':
          description: Unauthorized
      operationId: get-sources
      description: 'Retrieve the configured sources, optionally filtering by kind.'
      parameters:
        - schema:
            type: string
          in: query
          name: kind-id
    post:
      summary: Create Source
      tags: []
      operationId: post-sources
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connector-listing'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
        '422':
          description: Source kind unsupported or other semantic error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '502':
          description: Problematic Request to External Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Configure a new source.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/connector'
  '/sources/{source-id}/refresh':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    post:
      summary: Request source refresh
      tags: []
      responses:
        '202':
          description: Accepted
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
      operationId: refresh-source-by-id
      description: Refresh a particular source.
  '/sources/{source-id}/auth':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    put:
      summary: Authenticate a source that needs authentication
      tags: []
      responses:
        '202':
          description: Accepted. Authentication attempt has been made. The source status will reflect the outcome of this operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connector'
        '400':
          description: The authentication values you provided are incompatible with the authentication strategy of the source's kind
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
      operationId: auth-source-by-id
      description: Authenticate a source. If the source is already authenticated - the authentication details are overwritten.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth'
  '/sources/{source-id}':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    get:
      summary: Get a source
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connector'
              examples:
                example-1:
                  value:
                    config:
                      - name: Shop name
                        value: MyShop
                    id: '1'
                    kindId: '12'
                    name: 'Shop name: MyShop'
                    status:
                      type: ready
                      at: 42
                    useCase: 'Shop analytics'
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
      operationId: get-sources-source-id
      description: Get a particular source.
    put:
      summary: Redefine a source
      tags: []
      operationId: put-sources-source-id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connector-listing'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
        '422':
          description: Source kind unsupported or other semantic error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '502':
          description: Problematic Request to External Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Redefine an existing source.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/connector'
    delete:
      summary: Delete a source
      tags: []
      responses:
        '204':
          description: deleted
        '401':
          description: Unauthorized
        '404':
          description: Source not found
      operationId: delete-sources-source-id
      description: Delete the specified source and remove datasets using this source from all pipelines.
  '/sources/{source-id}/pipelines/{pipeline-id}':
    delete:
      summary: Delete a source
      tags: []
      responses:
        '204':
          description: deleted
        '401':
          description: Unauthorized
        '404':
          description: 'Source not found, pipeline not found or source not found in pipeline.'
        '422':
          description: 'if force = false: source is used in other pipeline.'
      parameters:
        - schema:
            type: string
          name: source-id
          in: path
          required: true
        - schema:
            type: string
          name: pipeline-id
          in: path
          required: true
        - schema:
            type: boolean
          in: query
          name: force
          required: false
      operationId: delete-sources-source-id-pipelines-pipeline-id
      description: 'Delete the specified source and remove datasets using this source from specified pipeline. If force = true, then remove datasets using this source from all pipelines.'
  '/sources/{source-id}/datasets':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    get:
      summary: Get datasets
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/dataset'
              examples:
                example-1:
                  value:
                    - id: '1'
                      name: Abandoned checkouts
                      sourceId: '1'
                    - id: '2'
                      name: Application charges
                      sourceId: '1'
                    - id: '3'
                      name: Application credits
                      sourceId: '1'
                    - id: '4'
                      name: Custom collections
                      sourceId: '1'
                    - id: '5'
                      name: Customer saved searches
                      sourceId: '1'
                    - id: '6'
                      name: Customers
                      sourceId: '1'
                    - id: '7'
                      name: Locations
                      sourceId: '1'
                    - id: '8'
                      name: Orders
                      sourceId: '1'
                    - id: '9'
                      name: Price rules
                      sourceId: '1'
                    - id: '10'
                      name: Products
                      sourceId: '1'
                    - id: '11'
                      name: Recurring application charges
                      sourceId: '1'
        '204':
          description: Dataset hasn't been discovered yet
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
      operationId: get-sources-source-id-datasets
      description: Get all available datasets for the provided source.
  '/datasets/{dataset-id}/abort-loading':
    parameters:
      - name: dataset-id
        schema:
          type: string
        in: path
        required: true
    post:
      summary: Abort the loading of the given dataset in all loads
      tags: []
      responses:
        '202':
          description: The request to abort the dataset has been accepted. Use pipeline and pipeline load dataset status to monitor the progress of this dataset in loads/pipelines which this dataset is a part of.
        '404':
          description: The provided dataset does not exist in the system
      description: Abort the loading of the given dataset in all loads
      operationId: abort-loading-for-dataset
  /destinations:
    get:
      summary: Get Destinations
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/connector-listing'
              examples:
                example-1:
                  value:
                    - id: '1'
                      kindId: '14'
                      name: 'Account: Precog, Database: Raw, Region: west-us-2.azure'
        '401':
          description: Unauthorized
      operationId: get-destinations
      description: 'Retrieve the configured destinations, optionally filtering by kind.'
      parameters:
        - schema:
            type: string
          in: query
          name: kind-id
    post:
      summary: Create Destination
      tags: []
      operationId: post-destinations
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connector-listing'
              examples:
                example-1:
                  value:
                    id: '1'
                    kindId: '14'
                    name: 'Account: Precog, Database: Raw, Region: west-us-2.azure'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
        '422':
          description: Destination kind unsupported or other semantic error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Configure a new destination.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/connector'
  '/destinations/{destination-id}':
    parameters:
      - schema:
          type: string
        name: destination-id
        in: path
        required: true
    get:
      summary: Get a destination
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connector'
              examples:
                example-1:
                  value:
                    config: []
                    id: '1'
                    kindId: '14'
                    name: 'Account: Precog, Database: Raw, Region: west-us-2.azure'
                    status:
                      type: ready
                      at: 42
        '401':
          description: Unauthorized
        '404':
          description: Destination not found.
      operationId: get-destinations-destination-id
      description: Get a particular destination.
    put:
      summary: Redefine a destination
      tags: []
      operationId: put-destinations-destination-id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connector-listing'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
        '404':
          description: Destination not found.
        '422':
          description: Destination kind unsupported or other semantic error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '502':
          description: Problematic Request to External Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Redefine an existing destination.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/connector'
  '/kinds/{kind-id}':
    parameters:
      - schema:
          type: string
        name: kind-id
        in: path
        required: true
    get:
      summary: Get connector schema
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema:
                    $ref: '#/components/schemas/kind-schema'
                  auth:
                    $ref: '#/components/schemas/auth-schema'
                required:
                  - schema
        '401':
          description: Unauthorized
        '404':
          description: Kind not found.
      operationId: get-kinds-kind-id
      description: Get the configuration schema for a particular kind of source.
  /kinds/source:
    get:
      summary: Get source kinds
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/connector-kind'
              examples:
                example-1:
                  value:
                    - id: '1'
                      name: Active Campaign
                      image: 'data:image/svg+xml;base64,'
                    - id: '2'
                      name: Ariba Analytics
                    - id: '3'
                      name: Bing Ads
                    - id: '4'
                      name: Chargeback
                    - id: '5'
                      name: Clockify
                    - id: '6'
                      name: Everflow
                    - id: '7'
                      name: Facebook Ads
                    - id: '8'
                      name: Google Ads
                    - id: '9'
                      name: Gravity Forms
                    - id: '10'
                      name: Hubspot
                    - id: '11'
                      name: Salesforce
                    - id: '12'
                      name: Shopify
                    - id: '13'
                      name: WooCommerce
        '401':
          description: Unauthorized
      operationId: get-kinds-source
      description: Retrieve the available kinds of sources.
  /kinds/destination:
    get:
      summary: Get destination kinds
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/connector-kind'
              examples:
                example-1:
                  value:
                    - id: '14'
                      name: Snowflake
                      image: 'data:image/svg+xml;base64,'
                    - id: '15'
                      name: Panoply
                    - id: '16'
                      name: Redshift
                    - id: '17'
                      name: Google BigQuery
                    - id: '18'
                      name: Firebolt
        '401':
          description: Unauthorized
      operationId: get-kinds-destination
      description: Retrieve the available kinds of destinations.
  /pipelines:
    get:
      summary: Get pipelines
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/pipeline-listing'
              examples:
                example-1:
                  value:
                    - id: '1'
                      name: Ecommerce
                      driftedDatasets: []
                    - id: '2'
                      name: Internal
                      driftedDatasets:
                        - datasetId: 'ds-42'
                          driftedAt: '2026-04-10T12:00:00Z'
                          offset:
                            type: num
                            value: 150
                    - id: '3'
                      name: Staging environment
                      driftedDatasets: []
                    - id: '4'
                      name: Test environment
                      driftedDatasets: []
        '401':
          description: Unauthorized
      operationId: get-pipelines
      description: Get all pipelines.
    post:
      summary: Create pipeline
      tags: []
      operationId: post-pipelines
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
        '422':
          description: Semantic error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Create a new pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pipeline'
        description: ''
  /pipelines/status:
    parameters: []
    get:
      summary: Get the pipeline status
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/pipeline-status'
              examples:
                example-1:
                  value:
                    - pipelineId: '1'
                      status:
                        at: 1632428787341
                        state: loading
                    - pipelineId: '3'
                      status:
                        at: 1632128787341
                        state: succeeded
                    - pipelineId: '4'
                      status:
                        at: 1631251787341
                        state: failed
        '401':
          description: Unauthorized
      operationId: get-pipelines-status
      description: Get the status of all the pipelines.
  '/pipelines/{pipeline-id}':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get a pipeline
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline'
              examples:
                example-1:
                  value:
                    destinationId: '1'
                    id: '1'
                    name: Ecommerce
                    columnNameStrategy:
                      tableNamePostfix: true
                    driftedDatasets: []
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found.
      operationId: get-pipelines-pipeline-id
      description: Get a particular pipeline.
    delete:
      summary: ''
      tags: []
      operationId: delete-pipelines-pipeline-id
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
      description: Deletes the given pipeline
  '/pipelines/{pipeline-id}/metrics':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get the pipeline metrics
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aggregated-pipeline-metrics'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found.
      description: Get the metrics from a pipeline

  '/pipelines/{pipeline-id}/datasets':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get the pipeline datasets
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/dataset'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found.
      operationId: get-pipelines-pipeline-id-datasets
      description: Get the datasets in the provided pipeline.
    patch:
      summary: ''
      tags: []
      operationId: patch-pipelines-pipeline-id-datasets
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found. <or> Datasets not found.
        '422':
          description: Semantic error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Add (or remove) datasets to (or from) the provided pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dataset-update'
            examples:
              example-1:
                value:
                  action: add
                  datasetIds:
                    - string
  '/pipelines/{pipeline-id}/details':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get pipeline details
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline-details'
              examples:
                example-1:
                  value:
                    datasets:
                      - dataset:
                          - id: '1'
                            name: Abandoned checkouts
                          - id: '2'
                            name: Application charges
                          - id: '3'
                            name: Application credits
                          - id: '4'
                            name: Custom collections
                          - id: '5'
                            name: Customer saved searches
                          - id: '6'
                            name: Customers
                          - id: '7'
                            name: Locations
                          - id: '8'
                            name: Orders
                          - id: '9'
                            name: Price rules
                          - id: '10'
                            name: Products
                          - id: '11'
                            name: Recurring application charges
                        source:
                          id: '1'
                          kind:
                            id: '12'
                            name: Shopify
                          name: 'Shop name: MyShop'
                    destination:
                      id: '1'
                      kind:
                        id: '14'
                        name: Snowflake
                      name: 'Account: Precog, Database: Raw, Region: west-us-2.azure'
                    pipeline:
                      id: '1'
                      name: Ecommerce
                      columnNameStrategy:
                        tableNamePostfix: false
                    schedule:
                      - '*/5 * * * *'
                    notifications:
                      - josie@email.com
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-details
      description: Get all the details for the provided pipeline.
  '/pipelines/{pipeline-id}/status':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get the pipeline datasets status
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline-dataset-status'
              examples:
                example-1:
                  value:
                    pipelineId: '1'
                    status:
                      state: succeeded
                      at: 0
                    datasets:
                      - id: string
                        outOfBand:
                          state: staging
                          at: 0
                        inBand:
                          state: staging
                          at: 0
                    semanticModels:
                      - jobId: 123-456
                        sourceId: the-source
                        useCase: Sales go brrr?
                        datasetIds:
                          - ds-1
                          - ds-2
                        status:
                          state: modeling
                          at: 1766097092134

        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-status
      description: Get the status of the provided pipeline.
  '/pipelines/{pipeline-id}/loads':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    post:
      summary: Start a pipeline load
      tags: []
      operationId: post-pipelines-pipeline-id-loads
      responses:
        '202':
          description: Accepted - there are in-band datasets and a load has been scheduled to start
        '204':
          description: No Content - there are no in-band datasets
        '400':
          description: Bad Request - there are no datasets in pipeline
        '401':
          description: Unauthorized
        '402':
          description: Payment Required - trial period has expired and there is no active subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    required:
                      - type
                      - details
                    properties:
                      type:
                        type: string
                        minLength: 1
                      details:
                        type: string
                  url:
                    type: string
                required:
                  - error
        '404':
          description: Pipeline not found.
        '502':
          description: Problematic Request to External Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Start a load for this pipeline.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                returnUrl:
                  type: string
        description: ''
  '/pipelines/{pipeline-id}/rename':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    put:
      summary: Rename a pipelne.
      tags: []
      operationId: put-pipelines-pipeline-id-rename
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found
        '422':
          description: Semantic error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
      description: Rename a pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pipeline-name'
  '/pipelines/{pipeline-id}/semantic-contexts':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      operationId: get-pipelines-pipeline-id-semantic-contexts
      summary: Get existing semantic contexts of this pipeline
      responses:
        '200':
          description: List of semantic contexts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/semantic-context'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
