  /issues/:
    post:
      summary: Create issue
      operationId: post-issues
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                required:
                  - id
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
        '401':
          description: Unauthorized
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - properties:
                    category:
                      type: string
                      enum:
                        - data
                    pipelineId:
                      type: string
                    datasetId:
                      type: string
                    description:
                      oneOf:
                        - properties:
                            type:
                              type: string
                              enum:
                                - missingRows
                                - duplicateRows
                          required:
                            - type
                        - properties:
                            type:
                              type: string
                              enum:
                                - missingColumns
