    primary-key-property:
      description: Primary key for a given dataset
      type: object
      title: pipeline dataset properties
      properties:
        primaryKey:
          type: object
          description: A primary key property
          properties:
            type:
              oneOf:
                - type: string
                  enum: [strict, optional]
                  description: Indicates whether the key is strict or optional
            components:
              type: array
              title: Primary key components
              items:
                type: string
                minLength: 1
          required: [type, components]
      required: [primaryKey]
      additionalProperties: false
    reuse-previous-primary-key:
      description: Legacy boolean or new strategy object.
      oneOf:
        - type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [detect-anew]
        - type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [reuse-previous]
        - type: object
          required: [type, primaryKey]
          properties:
            type:
              type: string
              enum: [use-provided]
            primaryKey:
              $ref: '#/components/schemas/primary-key-property'
        - type: boolean
      examples:
        - { "type": "detect-anew" }
        - { "type": "reuse-previous" }
        - { "type": "use-provided", "primaryKey": { "type": "strict", "components": ["$.path.to.id"] } }
        - true
    pipeline-details:
      title: pipeline-details
      type: object
      properties:
        pipeline:
          type: object
          required:
            - id
            - name
            - columnNameStrategy
          properties:
            id:
              type: string
              minLength: 1
            name:
              type: string
              minLength: 1
            columnNameStrategy:
              type: object
              required:
                - tableNamePostfix
              properties:
                tableNamePostfix:
                  type: boolean
        destination:
          type: object
          required:
            - id
            - name
            - kind
          properties:
            id:
              type: string
              minLength: 1
            name:
              type: string
              minLength: 1
            kind:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
        datasets:
          type: array
          uniqueItems: true
          items:
            type: object
            properties:
              source:
                type: object
                required:
                  - id
                  - name
                  - kind
                properties:
                  id:
                    type: string
                    minLength: 1
                  name:
                    type: string
                    minLength: 1
                  kind:
                    type: object
                    required:
                      - id
                      - name
                    properties:
                      id:
                        type: string
                        minLength: 1
                      name:
                        type: string
                        minLength: 1
              dataset:
                type: array
                uniqueItems: true
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                  required:
                    - id
                    - name
            required:
              - source
              - dataset
        schedule:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
        notifications:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
      required:
        - pipeline
        - destination
        - datasets
        - schedule
        - notifications
    dataset-update:
      title: dataset-update
      oneOf:
        - $ref: '#/components/schemas/dataset-update-new'
        - $ref: '#/components/schemas/dataset-update-legacy'
    dataset-update-new:
      type: object
      required: [action, dataset]
      properties:
        action:
          type: string
          enum: [add, remove, renew, abort]
        dataset:
          type: object
          minProperties: 1
          additionalProperties:
            $ref: '#/components/schemas/initial-load-params'
    dataset-update-legacy:
      deprecated: true
      type: object
      required: [action, datasetIds]
      properties:
        action:
          type: string
          enum: [add, remove, renew, abort]
        datasetIds:
          type: array
          description: List of dataset IDs to affect.
          uniqueItems: true
          items:
            type: string
            minLength: 1
        loadParameters:
          $ref: '#/components/schemas/initial-load-params'
    error-message:
      title: error-message
      type: object
      properties:
        error:
          type: object
          required:
            - type
            - details
          properties:
            type:
              type: string
              minLength: 1
            details:
              type: string
      required:
        - error
    url:
      title: url
      type: object
      properties:
        url:
          type: string
          minLength: 1
      required:
        - url
    log-message:
      title: log-message
      type: object
      properties:
        level:
          type: string
          enum:
            - error
            - warn
            - info
            - debug
            - trace
        message:
          type: string
      required:
        - level
        - message
      examples: []
    auth-schema-oauth2-details:
      title: auth-schema-oauth2-details
      type: object
      properties:
        uri:
          type: string
          minLength: 1
      required:
        - uri
    auth-schema-google-service-account-details:
      title: auth-schema-google-service-account-details
      type: object
      properties:
        scopes:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
      required:
        - scopes
    auth-schema:
      title: auth-schema
      type: object
      properties:
        type:
          type: string
          enum:
            - OAuth 2.0 code authorization
            - Google Service Account Key authorization
        details:
          oneOf:
            - $ref: '#/components/schemas/auth-schema-oauth2-details'
            - $ref: '#/components/schemas/auth-schema-google-service-account-details'
      required:
        - type
        - details
    auth-oauth2-details:
      title: auth-oauth2-details
      type: object
      properties:
        authCode:
          type: string
          minLength: 1
        redirectUri:
          type: string
          minLength: 1
      required:
        - authCode
        - redirectUri
    auth-google-service-account-details:
      title: auth-google-service-account-details
      type: object
      properties:
        keyFile:
          type: string
          minLength: 1
      required:
        - keyFile
    auth:
      title: auth
      type: object
      properties:
        type:
          type: string
          enum:
            - OAuth 2.0 code authorization
            - Google Service Account Key authorization
        details:
          oneOf:
            - $ref: '#/components/schemas/auth-oauth2-details'
            - $ref: '#/components/schemas/auth-google-service-account-details'
      required:
        - type
        - details
    epoch-millis:
      type: integer
      title: epoch-millis
      minimum: 0
      example: 1742922912239

    semantic-context:
      title: Pipeline semantic context
      description: 'Provides details about a semantic context'
      type: object
      properties:
        id:
          description: ID that uniquely identifies this semantic context
          type: string
          minLength: 1
        pipeline:
          description: ID of the pipeline that this semantic context describes
          type: string
          minLength: 1
        useCase:
          description: Use case which determines how the semantic model is generated under this semantic context
          type: string
          minLength: 1

    semantic-context-request:
      title: Semantic context request
      description: 'Describes the parameters to requests creating/modifying semantic contexts'
      type: object
      properties:
        useCase:
          description: Use case which determines how the semantic model is generated under this semantic context
          type: string
          minLength: 1

    semantic-modeling-summary:
      title: Semantic Modeling Status
      description: 'Provides details and lifecycle information about a semantic modeling process.'
      type: object
      properties:
        jobId:
          description: "Unique identifier of the job responsible for this model."
          type: string
          minLength: 1
        contextId:
          type: string
          minLength: 1
        useCase:
          type: string
          minLength: 1
        datasetIds:
          type: array
          items:
            type: string
            minLength: 1
        status:
          $ref: '#/components/schemas/semantic-modeling-status'
      required:
        - jobId
        - sourceId
        - useCase
        - datasetIds
        - status
    semantic-modeling-status:
      type: object
      title: Semantic Modeling Status
      properties:
        state:
          type: string
          enum:
            - pending
            - modeling
            - canceled
            - errored
            - succeeded
        at:
          $ref: '#/components/schemas/epoch-millis'
      required:
        - state
        - at
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
