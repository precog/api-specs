openapi: 3.1.0
info:
  title: public-http-api
  version: '1.0'
  summary: The Precog public HTTP REST API.
  description: The Precog public HTTP REST API.
  contact:
    url: 'https://precog.com'
    email: support@precog.com
servers:
  - url: 'http://localhost:3000'
security:
  - BearerAuth: []
paths:
  /sources:
    get:
      summary: Get Sources
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-listing'
        '401':
          description: Unauthorized
      operationId: get-sources
      description: 'Retrieve the configured sources, optionally filtering by kind.'
      parameters:
        - schema:
            type: string
          in: query
          name: kind-id
    post:
      summary: Create Source
      tags: []
      operationId: post-sources
      responses:
        '200':
          description: Error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/error-unavailable'
                  - $ref: '#/components/schemas/error-auth-failed'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin-listing'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
        '415':
          description: Source kind unsupported.
      description: Configure a new source.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/plugin'
  '/sources/{source-id}':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    get:
      summary: Get a source
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin'
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
      operationId: get-sources-source-id
      description: Get a particular source.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
  '/sources/{source-id}/datasets':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    get:
      summary: Get datasets
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/dataset'
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
      operationId: get-sources-source-id-datasets
      description: Get all available datasets for the provided source.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
  '/sources/{source-id}/configuration':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    put:
      summary: Update a source config
      tags: []
      operationId: put-sources-source-id
      responses:
        '200':
          description: Error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/error-unavailable'
                  - $ref: '#/components/schemas/error-auth-failed'
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
        '404':
          description: Source not found.
      description: Update a source configuration for a particular source.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  $ref: '#/components/schemas/plugin-config'
                auth:
                  $ref: '#/components/schemas/auth-oauth2'
              required:
                - config
  /destinations:
    get:
      summary: Get Destinations
      tags: []
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-listing'
        '401':
          description: Unauthorized
      operationId: get-destinations
      description: 'Retrieve the configured destinations, optionally filtering by kind.'
      parameters:
        - schema:
            type: string
          in: query
          name: kind-id
    post:
      summary: Create Destination
      tags: []
      operationId: post-destinations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin-listing'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
        '415':
          description: Destination kind unsupported.
      description: Configure a new destination.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/plugin'
  '/destinations/{destination-id}':
    parameters:
      - schema:
          type: string
        name: destination-id
        in: path
        required: true
    get:
      summary: Get a destination
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin'
        '401':
          description: Unauthorized
        '404':
          description: Destination not found.
      operationId: get-destinations-destination-id
      description: Get a particular destination.
  '/destinations/{destination-id}/configuration':
    parameters:
      - schema:
          type: string
        name: destination-id
        in: path
        required: true
    put:
      summary: Update a destination config
      tags: []
      operationId: put-destinations-destination-id
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
        '404':
          description: Destination not found.
      description: Update a destination configuration for a particular destination .
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  $ref: '#/components/schemas/plugin-config'
  '/destinations/{destination-id}/testing':
    parameters:
      - schema:
          type: string
        name: destination-id
        in: path
        required: true
    post:
      summary: Test a destination
      tags: []
      operationId: post-destinations-destination-id-testing
      responses:
        '200':
          description: Connection failed
          content:
            text/plain:
              schema:
                type: string
        '201':
          description: Connection succeeded
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unauthorized
        '404':
          description: Destination not found
      description: Test the connection to a particular destination. Returns the connection logs upon connection success and connetion failure.
  '/kinds/{kind-id}':
    parameters:
      - schema:
          type: string
        name: kind-id
        in: path
        required: true
    get:
      summary: Get plugin schema
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema:
                    $ref: '#/components/schemas/plugin-schema'
                  auth:
                    $ref: '#/components/schemas/auth-schema-oauth2'
                required:
                  - schema
        '401':
          description: Unauthorized
        '404':
          description: Kind not found.
      operationId: get-kinds-kind-id
      description: Get the configuration schema for a particular kind of source.
  /kinds/source:
    get:
      summary: Get source kinds
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-kind'
        '401':
          description: Unauthorized
      operationId: get-kinds-source
      description: Retrieve the available kinds of sources.
  /kinds/destination:
    get:
      summary: Get destination kinds
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-kind'
        '401':
          description: Unauthorized
      operationId: get-kinds-destination
      description: Retrieve the available kinds of destinations.
  /pipelines:
    get:
      summary: Get pipelines
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/pipeline-listing'
        '401':
          description: Unauthorized
      operationId: get-pipelines
      description: Get all pipelines.
    post:
      summary: Create pipeline
      tags: []
      operationId: post-pipelines
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
      description: Create a new pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pipeline'
          application/xml:
            schema:
              $ref: '#/components/schemas/pipeline-listing'
        description: ''
  /pipelines/status:
    parameters: []
    get:
      summary: Get the pipeline status
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/pipeline-status'
        '401':
          description: Unauthorized
      operationId: get-pipelines-status
      description: Get the status of all the pipelines.
  '/pipelines/{pipeline-id}':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get a pipeline
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found.
      operationId: get-pipelines-pipeline-id
      description: Get a particular pipeline.
  '/pipelines/{pipeline-id}/datasets':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get the pipeline datasets
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/dataset'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found.
      operationId: get-pipelines-pipeline-id-datasets
      description: Get the datasets in the provided pipeline.
    patch:
      summary: ''
      tags: []
      operationId: patch-pipelines-pipeline-id-datasets
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found. <or> Datasets not found.
          content:
            application/json:
              schema:
                type: array
                description: The datasets that were not found.
                items:
                  $ref: '#/components/schemas/id'
      description: Add or remove datasets from the provided pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dataset-update'
  '/pipelines/{pipeline-id}/details':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get pipeline details
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline-details'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-details
      description: Get all the details for the provided pipeline.
  '/pipelines/{pipeline-id}/status':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get the pipeline datasets status
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline-dataset-status'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-status
      description: Get the status of the provided pipeline.
  '/pipelines/{pipeline-id}/loads':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    delete:
      summary: Cancel the current load
      tags: []
      operationId: delete-pipelines-pipeline-id-loads
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
      description: Cancel the current load for this pipeline.
    post:
      summary: Start a pipeline load
      tags: []
      operationId: post-pipelines-pipeline-id-loads
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found.
      description: Start a load for this pipeline.
  '/pipelines/{pipeline-id}/rename':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    put:
      summary: Rename a pipelne.
      tags: []
      operationId: put-pipelines-pipeline-id-rename
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found
      description: Rename a pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pipeline-name'
  '/pipelines/{pipeline-id}/loads/latest/logs':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get pipeline logs for the latest load
      tags: []
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
        '204':
          description: This dataset has not yet been loaded
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found <OR> Dataset not found
      operationId: get-pipelines-pipeline-id-loads-latest-logs
      description: Get pipeline logs for the latest load and provided dataset
      parameters:
        - schema:
            type: string
          in: query
          name: dataset-id
          required: true
  /stripe/check:
    post:
      summary: Check Stripe subscription status
      tags: []
      operationId: post-stripe-check
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/url'
                  - $ref: '#/components/schemas/error-unavailable'
        '204':
          description: Valid Subscription
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                returnUrl:
                  type: string
                  minLength: 1
              required:
                - returnUrl
      description: Check the Stripe subscription status
  /stripe/session:
    post:
      summary: Create Stripe session
      tags: []
      operationId: post-stripe-session
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/url'
                  - $ref: '#/components/schemas/error-unavailable'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-400'
        '401':
          description: Unauthorized
        '404':
          description: Stripe customer not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                returnUrl:
                  type: string
                  minLength: 1
              required:
                - returnUrl
      description: Create a Stripe customer portal session
    parameters: []
components:
  schemas:
    plugin:
      description: ''
      type: object
      title: ''
      properties:
        id:
          type: string
          readOnly: true
        kindId:
          type: string
        config:
          $ref: '#/components/schemas/plugin-config'
        name:
          type: string
          readOnly: true
        auth:
          $ref: '#/components/schemas/auth-oauth2'
          writeOnly: true
      required:
        - id
        - kindId
        - config
        - name
    plugin-listing:
      description: ''
      type: object
      title: ''
      properties:
        id:
          type: string
          readOnly: true
        kindId:
          type: string
        name:
          type: string
      required:
        - id
        - kindId
        - name
    plugin-config:
      description: ''
      type: array
      title: ''
      items:
        $ref: '#/components/schemas/plugin-config-entry'
    plugin-schema:
      description: ''
      type: array
      title: ''
      items:
        $ref: '#/components/schemas/plugin-schema-entry'
    plugin-kind:
      description: ''
      type: object
      title: ''
      properties:
        name:
          type: string
        id:
          type: string
      required:
        - name
        - id
    plugin-schema-entry:
      description: ''
      type: object
      title: ''
      properties:
        description:
          type: string
        sensitive:
          type: boolean
        name:
          type: string
      required:
        - description
        - sensitive
        - name
    plugin-config-entry:
      description: ''
      type: object
      properties:
        value:
          type: string
        name:
          type: string
      required:
        - value
        - name
    pipeline-listing:
      title: ''
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
      required:
        - id
        - name
    pipeline:
      title: ''
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          minLength: 1
        destinationId:
          type: string
          minLength: 1
      required:
        - id
        - name
        - destinationId
    dataset:
      title: ''
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sourceId:
          type: string
      required:
        - id
        - name
        - sourceId
    id:
      title: ''
      type: object
      properties:
        id:
          type: string
      required:
        - id
    pipeline-name:
      title: ''
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required:
        - name
    pipeline-status:
      title: ''
      type: object
      properties:
        pipelineId:
          type: string
        previous:
          $ref: '#/components/schemas/previous-state'
        current:
          $ref: '#/components/schemas/current-state'
      required:
        - pipelineId
        - current
    dataset-status:
      title: ''
      type: object
      description: ''
      properties:
        id:
          type: string
        outOfBand:
          $ref: '#/components/schemas/outofband-state'
        inBand:
          $ref: '#/components/schemas/inband-state'
      required:
        - id
    pipeline-dataset-status:
      title: ''
      type: object
      properties:
        pipelineId:
          type: string
        previous:
          type: array
          items:
            $ref: '#/components/schemas/previous-state'
        current:
          $ref: '#/components/schemas/current-state'
        datasets:
          type: array
          items:
            $ref: '#/components/schemas/dataset-status'
      required:
        - pipelineId
        - previous
        - current
        - datasets
    previous-state:
      title: ''
      type: object
      properties:
        state:
          type: string
          enum:
            - succeeded
            - failed
        at:
          type: number
      required:
        - state
        - at
    outofband-state:
      title: ''
      type: object
      properties:
        state:
          type: string
          enum:
            - loading
        at:
          type: number
      required:
        - state
        - at
    inband-state:
      title: ''
      type: object
      properties:
        state:
          type: string
          enum:
            - loading
            - writing
            - waiting
            - written
        at:
          type: number
      required:
        - state
        - at
    current-state:
      title: ''
      type: object
      properties:
        state:
          type: string
          enum:
            - loading
            - not loading
        at:
          type: number
      required:
        - state
        - at
    pipeline-details:
      title: pipeline-details
      type: object
      properties:
        pipeline:
          required:
            - id
            - name
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        destination:
          required:
            - id
            - name
            - kind
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            kind:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: string
                name:
                  type: string
        datasets:
          type: array
          items:
            type: object
            properties:
              source:
                required:
                  - id
                  - name
                  - kind
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  kind:
                    type: object
                    required:
                      - id
                      - name
                    properties:
                      id:
                        type: string
                      name:
                        type: string
              dataset:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                  required:
                    - id
                    - name
            required:
              - source
              - dataset
      required:
        - pipeline
        - destination
        - datasets
    dataset-update:
      title: dataset-update
      type: object
      properties:
        action:
          type: string
          enum:
            - add
            - remove
        datasetIds:
          type: array
          items:
            type: string
      required:
        - action
        - datasetIds
    error-unavailable:
      title: error-unavailable
      type: object
      properties:
        error:
          type: object
          required:
            - type
            - details
          properties:
            type:
              type: string
              enum:
                - unavailable
            details:
              type: string
      required:
        - error
    error-auth-failed:
      title: error-auth-failed
      type: object
      description: ''
      properties:
        error:
          type: object
          required:
            - type
            - details
          properties:
            type:
              type: string
              enum:
                - authentication failed
            details:
              type: string
      required:
        - error
    error-400:
      title: error-400
      type: object
      properties:
        error:
          type: object
          required:
            - type
            - details
          properties:
            type:
              type: string
              enum:
                - invalid JSON
                - field missing
            details:
              type: string
      required:
        - error
    url:
      title: url
      type: object
      properties:
        url:
          type: string
      required:
        - url
    auth-schema-oauth2:
      title: auth-schema-oauth2
      type: object
      properties:
        type:
          type: string
          enum:
            - oauth 2.0 code authorization
        details:
          type: object
          required:
            - uri
          properties:
            uri:
              type: string
              minLength: 1
      required:
        - type
        - details
    auth-oauth2:
      title: auth-oauth2
      type: object
      properties:
        type:
          type: string
          enum:
            - oauth 2.0 code authorization
        details:
          type: object
          required:
            - authCode
            - redirectUri
          properties:
            authCode:
