                    - datasetId
                    - description
                - properties:
                    category:
                      type: string
                      enum:
                        - dataset-request
                    kindId:
                      type: string
                      minLength: 1
                    docsURL:
                      type: string
                    usecase:
                      type: string
                    datasets:
                      type: array
                      uniqueItems: true
                      items:
                        type: string
                  required:
                    - category
                    - kindId
                    - usecase
                    - datasets
                - properties:
                    category:
                      type: string
                      enum:
                        - source-request
                    productName:
                      type: string
                    productURL:
                      type: string
                    loginURL:
                      type: string
                    docsURL:
                      type: string
                    credentials:
                      type: string
                    usecase:
                      type: string
                    datasets:
                      type: array
                      uniqueItems: true
                      items:
                        type: string
                  required:
                    - category
                    - productName
                    - productURL
                    - loginURL
                    - credentials
                    - usecase
                    - datasets
              type: object
        description: ''
      description: Creates a new issue for engineering to look into
  '/issues/{issue-id}/assets':
    parameters:
