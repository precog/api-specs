        '401':
          description: Unauthorized
      description: Marks an issue resolution as accepted by the customer.
components:
  schemas:
    connector:
      description: ''
      type: object
      title: ''
      properties:
        id:
          type: string
          minLength: 1
          readOnly: true
        kindId:
          type: string
          minLength: 1
        config:
          $ref: '#/components/schemas/connector-config'
        name:
          type: string
          minLength: 1
          readOnly: true
        useCase:
          type: string
        auth:
          $ref: '#/components/schemas/auth'
          writeOnly: true
        status:
          type: object
          required:
            - type
            - at
          properties:
            type:
              oneOf:
                - enum:
                    - ready
                    - input-required
                    - user-action
                    - authentication-required
                    - loading
                    - processing
              type: string
            message:
              type: string
            action:
              $ref: '#/components/schemas/action'
            at:
              $ref: '#/components/schemas/epoch-millis'
          readOnly: true
      required:
        - id
        - kindId
        - config
        - name
        - status
    connector-listing:
      description: ''
      type: object
      title: ''
      properties:
        id:
          type: string
          minLength: 1
          readOnly: true
        kindId:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
      required:
        - id
        - kindId
        - name
    connector-config:
      description: ''
      type: array
      title: ''
      items:
        $ref: '#/components/schemas/connector-config-entry'
    kind-schema:
      description: ''
      type: array
      title: ''
      items:
        oneOf:
          - $ref: '#/components/schemas/kind-schema-input-entry'
