      title: ''
      type: object
      properties:
        input:
          $ref: '#/components/schemas/kind-schema-input-field'
      required:
        - input
    kind-schema-upload-entry:
      title: ''
      type: object
      properties:
        upload:
          $ref: '#/components/schemas/kind-schema-upload-field'
      required:
        - upload
    kind-schema-dropdown-entry:
      title: ''
      type: object
      properties:
        input:
          $ref: '#/components/schemas/kind-schema-dropdown-field'
      required:
        - input
