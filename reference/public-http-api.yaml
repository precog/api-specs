openapi: 3.1.0
info:
  title: public-http-api
  version: '1.0'
  summary: The Precog public HTTP REST API.
  description: The Precog public HTTP REST API.
  contact:
    url: 'https://precog.com'
    email: support@precog.com
servers:
  - url: 'http://localhost:3000'
paths:
  /sources:
    get:
      summary: Get Sources
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-listing'
      operationId: get-sources
      description: 'Retrieve the configured sources, optionally filtering by kind.'
      parameters:
        - schema:
            type: string
          in: query
          name: kind-id
    post:
      summary: Create Source
      tags: []
      operationId: post-sources
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin-listing'
        '400':
          description: Request body malformed.
        '415':
          description: Source kind unsupported. <or> Source version unsupported.
      description: Configure a new source.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/plugin'
  '/sources/{source-id}':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    get:
      summary: Get a source
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin'
        '404':
          description: Source not found.
      operationId: get-sources-source-id
      description: Get a particular source.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
  '/sources/{source-id}/configuration':
    parameters:
      - schema:
          type: string
        name: source-id
        in: path
        required: true
    post:
      summary: Update a source config
      tags: []
      operationId: post-sources-source-id
      responses:
        '204':
          description: No Content
        '400':
          description: Request body malformed.
        '404':
          description: Source not found.
      description: Update a source configuration for a particular source.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  $ref: '#/components/schemas/plugin-config'
  /destinations:
    get:
      summary: Get Destinations
      tags: []
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-listing'
      operationId: get-destinations
      description: 'Retrieve the configured destinations, optionally filtering by kind.'
      parameters:
        - schema:
            type: string
          in: query
          name: kind-id
    post:
      summary: Create Destination
      tags: []
      operationId: post-destinations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin-listing'
        '400':
          description: Request body malformed.
        '415':
          description: Destination kind unsupported. <or> Destination version unsupported.
      description: Configure a new destination.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/plugin'
  '/destinations/{destination-id}':
    parameters:
      - schema:
          type: string
        name: destination-id
        in: path
        required: true
    get:
      summary: Get a destination
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/plugin'
        '404':
          description: Destination not found.
      operationId: get-destinations-destination-id
      description: Get a particular destination.
  '/destinations/{destination-id}/configuration':
    parameters:
      - schema:
          type: string
        name: destination-id
        in: path
        required: true
    post:
      summary: Update a destination config
      tags: []
      operationId: post-destinations-destination-id
      responses:
        '204':
          description: No Content
        '400':
          description: Request body malformed.
        '404':
          description: Destination not found.
      description: Update a destination configuration for a particular destination .
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  $ref: '#/components/schemas/plugin-config'
  '/destinations/{destination-id}/testing':
    parameters:
      - schema:
          type: string
        name: destination-id
        in: path
        required: true
    post:
      summary: Test a destination
      tags: []
      operationId: post-destinations-destination-id-testing
      responses:
        '200':
          description: TODO return test outcome and log events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  outcome:
                    type: string
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/log-event'
        '404':
          description: Destination not found
      description: Test the connection to a particular destination.
  /kinds/source:
    get:
      summary: Get source kinds
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-kind'
      operationId: get-kinds-source
      description: Retrieve the available kinds of sources.
  '/kinds/{kind-id}':
    parameters:
      - schema:
          type: string
        name: kind-id
        in: path
        required: true
    get:
      summary: Get plugin schema
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema:
                    $ref: '#/components/schemas/plugin-schema'
        '404':
          description: Kind not found.
      operationId: get-kinds-kind-id
      description: Get the configuration schema for a particular kind of source.
  /kinds/destination:
    get:
      summary: Get destination kinds
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/plugin-kind'
      operationId: get-kinds-destination
      description: Retrieve the available kinds of destinations.
  /datasets:
    get:
      summary: Get available datasets
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/dataset'
      operationId: get-datasets
      parameters:
        - schema:
            type: string
          in: query
          name: source-id
          required: true
      description: 'Get all available datasets, filtered by the provided source.'
    parameters: []
  /pipelines:
    get:
      summary: Get pipelines
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/pipeline-listing'
      operationId: get-pipelines
      description: Get all pipelines.
    post:
      summary: Create pipeline
      tags: []
      operationId: post-pipelines
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id'
      description: Create a new pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pipeline'
          application/xml:
            schema:
              $ref: '#/components/schemas/pipeline-listing'
        description: ''
  '/pipelines/{pipeline-id}':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get a pipeline
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline'
        '404':
          description: Pipeline not found.
      operationId: get-pipelines-pipeline-id
      description: Get a particular pipeline.
  '/pipelines/{pipeline-id}/schedule':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get a pipeline schedule
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/cron-statement'
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-schedule
      description: Get the schedule for a particular pipeline.
    post:
      summary: Update a pipeline schedule
      tags: []
      operationId: post-pipelines-pipeline-id-schedule
      responses:
        '204':
          description: No Content
        '404':
          description: Pipeline not found
      description: Update the schedule for a particular pipeline.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/cron-statement'
    delete:
      summary: Delete a pipeline schedule
      tags: []
      operationId: delete-pipelines-pipeline-id-schedule
      responses:
        '204':
          description: No Content
        '404':
          description: Pipeline not found
      description: Delete the schedule for a particular pipeline.
  '/pipelines/{pipeline-id}/datasets':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get the pipeline datasets
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/dataset'
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-datasets
      description: Get the datasets in the provided pipeline.
  '/pipelines/{pipeline-id}/status':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get the pipeline status
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/pipeline-status'
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-status
      description: Get the status of the provided pipeline.
  '/pipelines/{pipeline-id}/datasets/{dataset-id}':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
      - schema:
          type: string
        name: dataset-id
        in: path
        required: true
    delete:
      summary: Remove a dataset from a pipeline
      tags: []
      operationId: delete-pipelines-pipeline-id-datasets-dataset-id
      responses:
        '204':
          description: No Content
        '404':
          description: Pipeline not found <OR> Dataset not found
      description: Delete the provided dataset from the provided pipeline.
    post:
      summary: Add a dataset to a pipeline
      tags: []
      operationId: post-pipelines-pipeline-id-datasets-dataset-id
      responses:
        '204':
          description: No Content
        '404':
          description: Pipeline not found <OR> Dataset not found
      description: Add the provided dataset to the provided pipeline.
  '/pipelines/{pipeline-id}/rename':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    put:
      summary: ''
      operationId: put-pipelines-pipeline-id-rename
      responses:
        '204':
          description: No Content
        '404':
          description: Pipeline not found
      description: Rename a pipeline.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/name'
  '/pipelines/{pipeline-id}/emails':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get pipeline email addresses
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/email'
        '404':
          description: Pipeline not found
      operationId: get-pipelines-pipeline-id-emails
      description: Get all the email addresses associated with the pipeline.
    post:
      summary: Add a pipeline email address
      tags: []
      operationId: post-pipelines-pipeline-id-emails
      responses:
        '200':
          description: OK
        '404':
          description: Pipeline not found
      description: Add an email address to the pipeline
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/email'
        description: ''
  '/pipelines/{pipeline-id}/emails/{email-id}':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
      - schema:
          type: string
        name: email-id
        in: path
        required: true
    delete:
      summary: Remove an email address from a pipeline
      tags: []
      operationId: delete-pipelines-pipeline-id-emails-email-id
      responses:
        '200':
          description: OK
        '404':
          description: Pipeline not found <OR> Email not found
      description: Delete an email address from a pipeline
  '/pipelines/{pipeline-id}/loads':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    delete:
      summary: Cancel the current load
      tags: []
      operationId: delete-pipelines-pipeline-id-loads
      responses:
        '200':
          description: OK
      description: Cancel the current load for this pipeline.
    post:
      summary: Start a pipeline load
      tags: []
      operationId: post-pipelines-pipeline-id-loads
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id'
        '404':
          description: Pipeline not found.
      description: Start a load for this pipeline.
  '/pipelines/{pipeline-id}/loads/latest/logs':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get pipeline logs for the latest load
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/log-event'
        '204':
          description: This dataset has not yet been loaded
        '404':
          description: Pipeline not found <OR> Dataset not found
      operationId: get-pipelines-pipeline-id-loads-latest-logs
      description: Get pipeline logs for the latest load and provided dataset
      parameters:
        - schema:
            type: string
          in: query
          name: dataset-id
          required: true
components:
  schemas:
    plugin:
      description: ''
      type: object
      title: ''
      properties:
        id:
          type: string
          readOnly: true
        kindId:
          type: string
          minLength: 1
        config:
          $ref: '#/components/schemas/plugin-config'
        name:
          type: string
          readOnly: true
      required:
        - id
        - kindId
        - config
        - name
    plugin-listing:
      description: ''
      type: object
      title: ''
      properties:
        id:
          type: string
          readOnly: true
        kindId:
          type: string
          minLength: 1
        name:
          type: string
      required:
        - id
        - kindId
        - name
    plugin-config:
      description: ''
      type: array
      title: ''
      items:
        $ref: '#/components/schemas/plugin-config-entry'
    plugin-schema:
      description: ''
      type: array
      title: ''
      items:
        $ref: '#/components/schemas/plugin-schema-entry'
    plugin-kind:
      description: ''
      type: object
      title: ''
      properties:
        name:
          type: string
          minLength: 1
        kindId:
          type: string
      required:
        - name
    plugin-schema-entry:
      description: ''
      type: object
      title: ''
      properties:
        description:
          type: string
          minLength: 1
        sensitive:
          type: boolean
        name:
          type: string
      required:
        - description
        - sensitive
        - name
    plugin-config-entry:
      description: ''
      type: object
      properties:
        value:
          type: string
          minLength: 1
        name:
          type: string
      required:
        - value
        - name
    pipeline-listing:
      title: ''
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        destinationId:
          type: string
    pipeline:
      title: ''
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        datasetIds:
          type: array
          items:
            type: string
        destinationId:
          type: string
    cron-statement:
      title: ''
      type: object
      properties:
        cron:
          type: string
    dataset:
      title: ''
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sourceId:
          type: string
    id:
      title: ''
      type: object
      properties:
        id:
          type: string
    name:
      title: name
      type: object
      properties:
        name:
          type: string
      required:
        - name
    email:
      title: ''
      type: object
      properties:
        id:
          type: string
          readOnly: true
        email:
          type: string
    pipeline-status:
      title: ''
      type: object
      properties:
        datasetId:
          type: string
        status:
          type: string
        inBand:
          type: boolean
    log-event:
      title: ''
      type: string
  responses: {}
