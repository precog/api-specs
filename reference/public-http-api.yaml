      required:
        - metrics
        - total
    dataset:
      title: ''
      type: object
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        sourceId:
          type: string
          minLength: 1
      required:
        - id
        - name
        - sourceId
    id:
      title: ''
      type: object
      properties:
        id:
          type: string
      required:
        - id
    pipeline-name:
      title: ''
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required:
        - name
