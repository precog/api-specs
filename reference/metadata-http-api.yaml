openapi: 3.1.0
info:
  title: metadata-http-api
  version: '1.0'
  summary: The Precog metadata HTTP REST API.
  description: The Precog metadata HTTP REST API.
  contact:
    url: 'https://precog.com'
    email: support@precog.com
servers:
  - url: 'http://localhost:30000'
security:
  - BearerAuth: []
paths:
  '/pipelines/{pipeline-id}/metadata':
    parameters:
      - schema:
          type: string
        name: pipeline-id
        in: path
        required: true
    get:
      summary: Get metadata related to this pipeline
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline-metadata'
              examples:
                example-1:
                  value:
                    metadata:
                      - datasetId: '133425/example'
                        tables:
                          - tableName: example
                            primaryKey: [ id ]
                            columns:
                              - columnName: id
                                columnType: string
                                maxObservedStringLength: 42
                              - columnName: foo
                                columnType: decimal
                          - tableName: example_items
                            primaryKey: [ id_example, array_index ]
                            foreignKeys: 
                              example: 
                                - local: [ id_example ]
                                - reference: [ id ]
                            columns:
                              - columnName: id_example
                                columnType: string
                                maxObservedStringLength: 42
                              - columnName: array_index
                                columnType: long
                              - columnName: bar
                                columnType: boolean
        '401':
          description: Unauthorized
        '404':
          description: Pipeline not found.
      operationId: get-pipelines-pipeline-id-metadata
      description: Get metadata for a particular particular pipeline.
components:
  schemas:
    pipeline-metadata:
      description: 'Tables in this pipeline'
      type: object
      title: 'Pipeline metadata'
      properties:
        metadata:
          type: array
          title: 'Datasets'
          items:
            $ref: '#/components/schemas/dataset-metadata'
    dataset-metadata:
      description: 'Dataset tables'
      type: object
      title: 'Dataset tables'
      properties:
        datasetId:
          type: string
          minLength: 1
        tables:
          type: array
          title: 'Datasets'
          items:
            $ref: '#/components/schemas/table'
    table:
      description: 'Table schema'
      type: object
      title: 'Table schema'
      properties:
        tableName:
          type: string
          minLength: 1
        primaryKey:
          type: array
          uniqueItems: true
          items:
            type: string
        foreignKeys:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/foreignKey'
        columns:
          type: array
          title: 'Columns'
          items:
            $ref: '#/components/schemas/column'
    foreignKey:
      description: 'Foreign key'
      type: object
      required:
        - local
        - reference
      properties:
        local:
          type: array
          items: string
          minLength: 1
        reference:
          type: array
          items: string
          minLength: 1
    column:
      description: 'Column'
      type: object
      title: 'Column'
      required:
        - columnName
        - columnType
      properties:
        columnName:
          type: string
          minLength: 1
        columnType:
          type:
            oneOf:
              - properties: {}
                enum:
                  - boolean
                  - long
                  - double
                  - decimal
                  - localTime
                  - localDatetime
                  - localDate
                  - offsetDatetime
                  - string
        maxObservedStringLength:
          type: integer
        piiHandling:
          description: >-
            Optional PII handling strategy for this column. When omitted, the column
            is treated as non-PII (passthrough). Possible values:
            - hash: replace values with a deterministic HMAC-SHA256 digest
            - omit: exclude the column from output entirely
            - nullify: replace values with empty strings
          type: string
          enum:
            - hash
            - omit
            - nullify
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
